name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Load .env into environment (optional)
        run: |
          if [ -f .env ]; then
            echo "Loading .env values into job environment"
            while IFS='=' read -r key val; do
              if [ -n "$key" ]; then
                echo "$key=$val" >> $GITHUB_ENV
              fi
            done < .env
          fi
      - name: Lint
        run: npm run lint
      - name: Run tests (CI)
        run: npm run test:ci
      - name: Build
        run: npm run build
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
      - name: SonarCloud scan (optional)
        run: |
          if [ -n "$SONAR_TOKEN" ]; then
            echo "Would run SonarCloud scan here (SONAR_TOKEN present)."
          else
            echo "SONAR_TOKEN not set; skipping SonarCloud scan."
          fi
